name: CI Pipeline 
on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Check env presence
        run: |
          python - <<'PY'
          import os
          print("DAGSHUB_PAT exists:", bool(os.getenv("DAGSHUB_PAT")))
          print("MLFLOW_TRACKING_URI exists:", bool(os.getenv("MLFLOW_TRACKING_URI")))
          PY
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}

    
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: install dependencies
        run: |
          pip install -r requirements.txt

      - name: run pipeline
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          dvc repro 
